      <stop offset="0%" stop-color="#050814" />
      <stop offset="60%" stop-color="#080b1c" />
      <stop offset="100%" stop-color="#100720" />
    </linearGradient>
    <radialGradient id="glow2" cx="90%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#bf35ff" stop-opacity="0.3" />
