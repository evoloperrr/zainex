<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050814" />
      <stop offset="55%" stop-color="#080b1c" />
      <stop offset="100%" stop-color="#100720" />
    </linearGradient>
    <radialGradient id="glowA" cx="88%" cy="8%" r="45%">
      <stop offset="0%" stop-color="#bf35ff" stop-opacity="0.28" />
      <stop offset="100%" stop-color="#bf35ff" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="6%" cy="94%" r="45%">
      <stop offset="0%" stop-color="#21c2ff" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#21c2ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="45%" stop-color="#edf1f9" />
      <stop offset="100%" stop-color="#aeb8ce" />
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#12e8ff" />
      <stop offset="36%" stop-color="#168fff" />
      <stop offset="64%" stop-color="#524dff" />
      <stop offset="100%" stop-color="#d33fff" />
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#46dcff" stop-opacity="0" />
      <stop offset="50%" stop-color="#46dcff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#46dcff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />

  <g opacity="0.14" stroke="#7897dc" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="300" x2="1200" y2="300" />
    <line x1="0" y1="450" x2="1200" y2="450" />
  </g>

  <text x="100" y="230" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="6" fill="#46dcff">AI INTELITRADE</text>
  <line x1="100" y1="250" x2="260" y2="250" stroke="url(#line)" stroke-width="2" />

  <text x="96" y="340" font-family="Arial, Helvetica, sans-serif" font-size="108" font-weight="800" letter-spacing="2">
    <tspan fill="url(#silver)">Z</tspan><tspan fill="url(#ai)">AI</tspan><tspan fill="url(#silver)">NEX</tspan>
  </text>

  <text x="100" y="410" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#cfd6ef">Trade with intelligence. Decide with control.</text>

  <text x="100" y="560" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" letter-spacing="1" fill="#8b96b3">ZAINEX-AI.COM</text>
</svg>
